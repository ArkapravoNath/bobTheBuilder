<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <rect width="390" height="844" fill="#F5F2EC"/>

  <!-- Toolbar — white, warm border -->
  <rect width="390" height="52" fill="#FFFFFF" stroke="#E5E0D8" stroke-width="0.5"/>
  <text x="20" y="34" font-family="Inter,sans-serif" font-size="12" fill="#1C1917" font-weight="600">9:41</text>
  <text x="20" y="34" font-family="Inter,sans-serif" font-size="24" fill="#1C1917">‹</text>
  <text x="195" y="33" font-family="Inter,sans-serif" font-size="15" fill="#1C1917" font-weight="700" text-anchor="middle">3D Model Viewer</text>
  <!-- Measure button — teak light bg -->
  <rect x="316" y="10" width="58" height="32" rx="6" fill="#F5E8D4"/>
  <text x="345" y="30" font-family="Inter,sans-serif" font-size="11" fill="#A06A3A" text-anchor="middle" font-weight="700">📏 Measure</text>

  <!-- Isometric viewport — cream warm bg -->
  <rect x="0" y="52" width="390" height="340" fill="#FDFCF9"/>

  <!-- ── ISOMETRIC BUILDING (Planner5D style) ── -->
  <!-- Ground plane / shadow -->
  <ellipse cx="195" cy="340" rx="130" ry="24" fill="rgba(160,106,58,0.08)"/>

  <!-- Room 1: Living — front face -->
  <polygon points="80,280 160,240 220,260 140,300" fill="#F5EDD8" stroke="#C4A882" stroke-width="1"/>
  <!-- Room 1: top face -->
  <polygon points="80,220 160,180 220,200 140,240" fill="#EDE0C4" stroke="#C4A882" stroke-width="1"/>
  <!-- Room 1: side wall (right) -->
  <polygon points="140,240 220,200 220,260 140,300" fill="#D4C4A8" stroke="#C4A882" stroke-width="0.5"/>

  <!-- Room 2: Bedroom — shifted right -->
  <polygon points="160,290 240,250 290,270 210,310" fill="#EDE8E0" stroke="#A89880" stroke-width="1"/>
  <polygon points="160,230 240,190 290,210 210,250" fill="#D8D0C8" stroke="#A89880" stroke-width="1"/>
  <polygon points="210,250 290,210 290,270 210,310" fill="#C8C0B8" stroke="#A89880" stroke-width="0.5"/>

  <!-- Room 3: Kitchen — back-left -->
  <polygon points="80,220 140,180 180,200 120,240" fill="#FDF0DC" stroke="#C8A85A" stroke-width="1"/>
  <polygon points="80,160 140,120 180,140 120,180" fill="#EDE0C0" stroke="#C8A85A" stroke-width="1"/>
  <polygon points="120,180 180,140 180,200 120,240" fill="#D8C4A0" stroke="#C8A85A" stroke-width="0.5"/>

  <!-- Roof outline (wireframe) -->
  <polygon points="80,160 160,110 290,150 210,200 120,180" fill="none" stroke="#A06A3A" stroke-width="1.5" stroke-dasharray="6 3"/>

  <!-- Door marker -->
  <rect x="105" y="268" width="22" height="32" rx="2" fill="#C4A882" opacity="0.9"/>

  <!-- Window markers -->
  <rect x="88"  y="232" width="18" height="14" rx="2" fill="#EBF2FC" opacity="0.8" stroke="#A06A3A" stroke-width="0.5"/>
  <rect x="152" y="222" width="18" height="14" rx="2" fill="#EBF2FC" opacity="0.8" stroke="#A06A3A" stroke-width="0.5"/>

  <!-- Controls — right side, minimal -->
  <rect x="340" y="100" width="40" height="40" rx="8" fill="#FFFFFF" stroke="#E5E0D8" stroke-width="1"/>
  <text x="360" y="125" font-family="Inter,sans-serif" font-size="18" fill="#1C1917" text-anchor="middle">↺</text>
  <rect x="340" y="152" width="40" height="40" rx="8" fill="#FFFFFF" stroke="#E5E0D8" stroke-width="1"/>
  <text x="360" y="177" font-family="Inter,sans-serif" font-size="22" fill="#1C1917" text-anchor="middle">+</text>
  <rect x="340" y="204" width="40" height="40" rx="8" fill="#FFFFFF" stroke="#E5E0D8" stroke-width="1"/>
  <text x="360" y="229" font-family="Inter,sans-serif" font-size="22" fill="#1C1917" text-anchor="middle">−</text>

  <!-- Measurement annotation (measure mode) -->
  <line x1="80" y1="355" x2="290" y2="355" stroke="#A06A3A" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="185" y="368" font-family="Inter,sans-serif" font-size="11" fill="#A06A3A" text-anchor="middle" font-weight="600">40.0 ft</text>

  <!-- ── Info section ── -->
  <text x="24" y="420" font-family="Inter,sans-serif" font-size="11" fill="#8A857C" font-weight="700" letter-spacing="1.5">PROJECT MODEL</text>
  <text x="24" y="452" font-family="Georgia,serif" font-size="28" fill="#1C1917" font-weight="700">Sharma Residence</text>
  <text x="24" y="476" font-family="Inter,sans-serif" font-size="14" fill="#8A857C">Tap any surface to select and apply materials.</text>
  <line x1="0" y1="498" x2="390" y2="498" stroke="#E5E0D8" stroke-width="1"/>

  <!-- ── Floor level tabs — underline style, teak active ── -->
  <text x="24" y="526" font-family="Inter,sans-serif" font-size="11" fill="#8A857C" font-weight="700" letter-spacing="1.5">STRUCTURAL LEVEL</text>
  <text x="24" y="558" font-family="Inter,sans-serif" font-size="13" fill="#1C1917" font-weight="700">GROUND FLOOR</text>
  <line x1="24" y1="562" x2="118" y2="562" stroke="#A06A3A" stroke-width="2"/>
  <text x="140" y="558" font-family="Inter,sans-serif" font-size="13" fill="#8A857C" font-weight="700">FIRST FLOOR</text>
  <text x="244" y="558" font-family="Inter,sans-serif" font-size="13" fill="#8A857C" font-weight="700">ROOF</text>
  <line x1="0" y1="574" x2="390" y2="574" stroke="#E5E0D8" stroke-width="1"/>

  <!-- ── Zone legend ── -->
  <text x="24" y="604" font-family="Inter,sans-serif" font-size="11" fill="#8A857C" font-weight="700" letter-spacing="1.5">SPACE ZONING</text>
  <rect x="24" y="618" width="18" height="18" rx="3" fill="#C4A882"/>
  <text x="50" y="631" font-family="Inter,sans-serif" font-size="15" fill="#1C1917">Living &amp; Entertainment</text>
  <rect x="24" y="648" width="18" height="18" rx="3" fill="#A89880"/>
  <text x="50" y="661" font-family="Inter,sans-serif" font-size="15" fill="#1C1917">Private Quarters</text>
  <rect x="24" y="678" width="18" height="18" rx="3" fill="#9A9490"/>
  <text x="50" y="691" font-family="Inter,sans-serif" font-size="15" fill="#1C1917">Utility &amp; Circulation</text>
  <line x1="0" y1="708" x2="390" y2="708" stroke="#E5E0D8" stroke-width="1"/>

  <!-- ── Material chips ── -->
  <text x="24" y="736" font-family="Inter,sans-serif" font-size="11" fill="#8A857C" font-weight="700" letter-spacing="1.5">PRIMARY MATERIALS</text>
  <rect x="24"  y="748" width="120" height="32" rx="6" fill="#FFFFFF" stroke="#E5E0D8" stroke-width="1"/>
  <circle cx="40" cy="764" r="6" fill="#C4A882"/>
  <text x="52" y="769" font-family="Inter,sans-serif" font-size="12" fill="#1C1917" font-weight="500">Teak Panelling</text>
  <rect x="152" y="748" width="110" height="32" rx="6" fill="#FFFFFF" stroke="#E5E0D8" stroke-width="1"/>
  <circle cx="168" cy="764" r="6" fill="#E8E4DC"/>
  <text x="180" y="769" font-family="Inter,sans-serif" font-size="12" fill="#1C1917" font-weight="500">Marble Floor</text>
  <rect x="24"  y="792" width="116" height="32" rx="6" fill="#FFFFFF" stroke="#E5E0D8" stroke-width="1"/>
  <circle cx="40" cy="808" r="6" fill="#1C1917"/>
  <text x="52" y="813" font-family="Inter,sans-serif" font-size="12" fill="#1C1917" font-weight="500">Matte Steel</text>
  <rect x="148" y="792" width="90" height="32" rx="6" fill="#FFFFFF" stroke="#E5E0D8" stroke-width="1"/>
  <circle cx="164" cy="808" r="6" fill="#C8C4C0"/>
  <text x="176" y="813" font-family="Inter,sans-serif" font-size="12" fill="#1C1917" font-weight="500">Plaster</text>

  <rect x="155" y="828" width="80" height="4" rx="2" fill="#1C1917" opacity="0.15"/>
</svg>
