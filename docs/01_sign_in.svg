<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <linearGradient id="bg01" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBFAF7"/>
      <stop offset="100%" stop-color="#F5F2EC"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="390" height="844" fill="url(#bg01)"/>
  <!-- Status bar -->
  <rect width="390" height="44" fill="#FBFAF7"/>
  <text x="20" y="30" font-family="Inter,sans-serif" font-size="12" fill="#2A2825" font-weight="600">9:41</text>
  <text x="340" y="30" font-family="Inter,sans-serif" font-size="11" fill="#2A2825">●●●</text>
  <!-- Brand pill -->
  <rect x="24" y="72" width="120" height="22" rx="3" fill="#2A2825"/>
  <text x="34" y="87" font-family="Inter,sans-serif" font-size="10" fill="#FBFAF7" font-weight="700" letter-spacing="2.5">BUILD BUDDY</text>
  <!-- Headline -->
  <text x="24" y="136" font-family="Georgia,serif" font-size="38" fill="#2A2825" font-weight="600">Welcome</text>
  <text x="24" y="174" font-family="Georgia,serif" font-size="38" fill="#2A2825" font-weight="600">back</text>
  <text x="24" y="210" font-family="Inter,sans-serif" font-size="15" fill="#8A857C">Sign in to continue designing.</text>
  <!-- Email field -->
  <text x="24" y="260" font-family="Inter,sans-serif" font-size="13" fill="#4A4744" font-weight="500">Email</text>
  <rect x="24" y="268" width="342" height="52" rx="10" fill="#FFFFFF" stroke="#E8E2D7" stroke-width="1.5"/>
  <text x="40" y="299" font-family="Inter,sans-serif" font-size="16" fill="#C4C0BA">you@example.com</text>
  <!-- Password field -->
  <text x="24" y="344" font-family="Inter,sans-serif" font-size="13" fill="#4A4744" font-weight="500">Password</text>
  <rect x="24" y="352" width="342" height="52" rx="10" fill="#FFFFFF" stroke="#E8E2D7" stroke-width="1.5"/>
  <text x="40" y="383" font-family="Inter,sans-serif" font-size="16" fill="#C4C0BA">Your password</text>
  <text x="318" y="383" font-family="Inter,sans-serif" font-size="13" fill="#8A857C">Show</text>
  <!-- Sign In button -->
  <rect x="24" y="428" width="342" height="52" rx="12" fill="#1E6FD9"/>
  <text x="195" y="459" font-family="Inter,sans-serif" font-size="16" fill="#FFFFFF" font-weight="600" text-anchor="middle">Sign In</text>
  <!-- Forgot password -->
  <text x="195" y="510" font-family="Inter,sans-serif" font-size="14" fill="#1E6FD9" text-anchor="middle" font-weight="500">Forgot your password?</text>
  <!-- Divider -->
  <line x1="24" y1="560" x2="172" y2="560" stroke="#E8E2D7" stroke-width="1"/>
  <text x="195" y="565" font-family="Inter,sans-serif" font-size="13" fill="#C4C0BA" text-anchor="middle">or</text>
  <line x1="218" y1="560" x2="366" y2="560" stroke="#E8E2D7" stroke-width="1"/>
  <!-- Google button -->
  <rect x="24" y="580" width="342" height="52" rx="12" fill="#FFFFFF" stroke="#E8E2D7" stroke-width="1.5"/>
  <circle cx="60" cy="606" r="10" fill="#4285F4"/>
  <text x="195" y="611" font-family="Inter,sans-serif" font-size="15" fill="#2A2825" font-weight="500" text-anchor="middle">Continue with Google</text>
  <!-- Footer -->
  <text x="195" y="760" font-family="Inter,sans-serif" font-size="14" fill="#8A857C" text-anchor="middle">Don't have an account? <tspan fill="#1E6FD9" font-weight="600">Sign up</tspan></text>
  <!-- Home indicator -->
  <rect x="155" y="820" width="80" height="4" rx="2" fill="#2A2825" opacity="0.2"/>
</svg>
