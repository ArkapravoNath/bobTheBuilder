<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <rect width="390" height="844" fill="#F5F2EC"/>
  <text x="20" y="34" font-family="Inter,sans-serif" font-size="12" fill="#1C1917" font-weight="600">9:41</text>

  <!-- Progress: step 1 of 3 — teak active dot -->
  <rect x="20" y="60" width="28" height="8" rx="4" fill="#A06A3A"/>
  <circle cx="60" cy="64" r="4" fill="#E5E0D8"/>
  <circle cx="76" cy="64" r="4" fill="#E5E0D8"/>
  <text x="370" y="70" font-family="Inter,sans-serif" font-size="13" fill="#8A857C" text-anchor="end">Step 1 of 3</text>

  <!-- Headline -->
  <text x="20" y="112" font-family="Georgia,serif" font-size="26" fill="#1C1917" font-weight="700">What are you</text>
  <text x="20" y="142" font-family="Georgia,serif" font-size="26" fill="#1C1917" font-weight="700">building?</text>
  <text x="20" y="168" font-family="Inter,sans-serif" font-size="14" fill="#8A857C">Pick the archetype that best describes your project.</text>

  <!-- Card 1 — SELECTED: teak border + light teak fill -->
  <rect x="20" y="192" width="350" height="100" rx="12" fill="#F5E8D4" stroke="#A06A3A" stroke-width="2"/>
  <rect x="36" y="210" width="48" height="48" rx="10" fill="#E8CEAD"/>
  <text x="60" y="242" font-size="22" text-anchor="middle">🚪</text>
  <text x="100" y="234" font-family="Inter,sans-serif" font-size="16" fill="#6B4226" font-weight="700">Single Room</text>
  <text x="100" y="252" font-family="Inter,sans-serif" font-size="13" fill="#8A857C">Renovate or build a single room</text>
  <text x="350" y="234" font-family="Inter,sans-serif" font-size="11" fill="#A06A3A" font-weight="700" text-anchor="end">100–500 sqft</text>
  <!-- Teak checkmark -->
  <circle cx="348" cy="244" r="11" fill="#A06A3A"/>
  <text x="348" y="249" font-family="Inter,sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="700">✓</text>

  <!-- Card 2 — unselected: white, warm border -->
  <rect x="20" y="304" width="350" height="100" rx="12" fill="#FFFFFF" stroke="#E5E0D8" stroke-width="1"/>
  <rect x="36" y="322" width="48" height="48" rx="10" fill="#F5F2EC"/>
  <text x="60" y="354" font-size="22" text-anchor="middle">🏠</text>
  <text x="100" y="346" font-family="Inter,sans-serif" font-size="16" fill="#1C1917" font-weight="700">Partial Home</text>
  <text x="100" y="364" font-family="Inter,sans-serif" font-size="13" fill="#8A857C">Wing, floor, or apartment renovation</text>
  <text x="350" y="346" font-family="Inter,sans-serif" font-size="11" fill="#A06A3A" font-weight="700" text-anchor="end">500–1500 sqft</text>

  <!-- Card 3 -->
  <rect x="20" y="416" width="350" height="100" rx="12" fill="#FFFFFF" stroke="#E5E0D8" stroke-width="1"/>
  <rect x="36" y="434" width="48" height="48" rx="10" fill="#F5F2EC"/>
  <text x="60" y="466" font-size="22" text-anchor="middle">🏡</text>
  <text x="100" y="458" font-family="Inter,sans-serif" font-size="16" fill="#1C1917" font-weight="700">Full House</text>
  <text x="100" y="476" font-family="Inter,sans-serif" font-size="13" fill="#8A857C">Complete build or gut renovation</text>
  <text x="350" y="458" font-family="Inter,sans-serif" font-size="11" fill="#A06A3A" font-weight="700" text-anchor="end">1500–4000 sqft</text>

  <!-- Card 4 -->
  <rect x="20" y="528" width="350" height="100" rx="12" fill="#FFFFFF" stroke="#E5E0D8" stroke-width="1"/>
  <rect x="36" y="546" width="48" height="48" rx="10" fill="#F5F2EC"/>
  <text x="60" y="578" font-size="22" text-anchor="middle">🏰</text>
  <text x="100" y="570" font-family="Inter,sans-serif" font-size="16" fill="#1C1917" font-weight="700">Mansion</text>
  <text x="100" y="588" font-family="Inter,sans-serif" font-size="13" fill="#8A857C">Luxury villa or multi-storey bungalow</text>
  <text x="350" y="570" font-family="Inter,sans-serif" font-size="11" fill="#A06A3A" font-weight="700" text-anchor="end">4000+ sqft</text>

  <!-- Continue — dark charcoal CTA -->
  <rect x="20" y="776" width="350" height="52" rx="6" fill="#1C1917"/>
  <text x="195" y="807" font-family="Inter,sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="700" letter-spacing="1">CONTINUE</text>
  <rect x="155" y="828" width="80" height="4" rx="2" fill="#1C1917" opacity="0.15"/>
</svg>
