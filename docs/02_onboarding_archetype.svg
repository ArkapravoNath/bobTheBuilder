<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <rect width="390" height="844" fill="#FBFAF7"/>
  <!-- Status bar -->
  <text x="20" y="58" font-family="Inter,sans-serif" font-size="12" fill="#2A2825" font-weight="600">9:41</text>
  <!-- Progress dots -->
  <rect x="24" y="72" width="24" height="8" rx="4" fill="#1E6FD9"/>
  <circle cx="60" cy="76" r="4" fill="#E8E2D7"/>
  <circle cx="76" cy="76" r="4" fill="#E8E2D7"/>
  <text x="366" y="82" font-family="Inter,sans-serif" font-size="13" fill="#8A857C" text-anchor="end">Step 1 of 3</text>
  <!-- Headline -->
  <text x="24" y="122" font-family="Georgia,serif" font-size="28" fill="#2A2825" font-weight="700">What are you</text>
  <text x="24" y="154" font-family="Georgia,serif" font-size="28" fill="#2A2825" font-weight="700">building?</text>
  <text x="24" y="182" font-family="Inter,sans-serif" font-size="15" fill="#8A857C">Pick the archetype that best describes your project.</text>
  <!-- Card 1 — Single Room (selected) -->
  <rect x="24" y="208" width="342" height="100" rx="14" fill="#F0F6FF" stroke="#1E6FD9" stroke-width="1.5"/>
  <rect x="40" y="226" width="48" height="48" rx="12" fill="#EBF2FC"/>
  <text x="64" y="256" font-size="22" text-anchor="middle">🚪</text>
  <text x="104" y="248" font-family="Inter,sans-serif" font-size="16" fill="#1E6FD9" font-weight="700">Single Room</text>
  <text x="104" y="267" font-family="Inter,sans-serif" font-size="13" fill="#8A857C">Renovate or build a single room</text>
  <text x="320" y="250" font-family="Inter,sans-serif" font-size="12" fill="#A06A3A" font-weight="700" text-anchor="end">100–500 sqft</text>
  <circle cx="348" cy="258" r="10" fill="#1E6FD9"/>
  <text x="348" y="263" font-family="Inter,sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="700">✓</text>
  <!-- Card 2 — Partial Home -->
  <rect x="24" y="320" width="342" height="100" rx="14" fill="#FFFFFF" stroke="#E8E2D7" stroke-width="1.5"/>
  <rect x="40" y="338" width="48" height="48" rx="12" fill="#F5F2EC"/>
  <text x="64" y="368" font-size="22" text-anchor="middle">🏠</text>
  <text x="104" y="360" font-family="Inter,sans-serif" font-size="16" fill="#2A2825" font-weight="700">Partial Home</text>
  <text x="104" y="379" font-family="Inter,sans-serif" font-size="13" fill="#8A857C">Wing, floor, or apartment renovation</text>
  <text x="320" y="362" font-family="Inter,sans-serif" font-size="12" fill="#A06A3A" font-weight="700" text-anchor="end">500–1500 sqft</text>
  <!-- Card 3 — Full House -->
  <rect x="24" y="432" width="342" height="100" rx="14" fill="#FFFFFF" stroke="#E8E2D7" stroke-width="1.5"/>
  <rect x="40" y="450" width="48" height="48" rx="12" fill="#F5F2EC"/>
  <text x="64" y="480" font-size="22" text-anchor="middle">🏡</text>
  <text x="104" y="472" font-family="Inter,sans-serif" font-size="16" fill="#2A2825" font-weight="700">Full House</text>
  <text x="104" y="491" font-family="Inter,sans-serif" font-size="13" fill="#8A857C">Complete build or gut renovation</text>
  <text x="320" y="474" font-family="Inter,sans-serif" font-size="12" fill="#A06A3A" font-weight="700" text-anchor="end">1500–4000 sqft</text>
  <!-- Card 4 — Mansion -->
  <rect x="24" y="544" width="342" height="100" rx="14" fill="#FFFFFF" stroke="#E8E2D7" stroke-width="1.5"/>
  <rect x="40" y="562" width="48" height="48" rx="12" fill="#F5F2EC"/>
  <text x="64" y="592" font-size="22" text-anchor="middle">🏰</text>
  <text x="104" y="584" font-family="Inter,sans-serif" font-size="16" fill="#2A2825" font-weight="700">Mansion</text>
  <text x="104" y="603" font-family="Inter,sans-serif" font-size="13" fill="#8A857C">Luxury villa or multi-storey bungalow</text>
  <text x="320" y="586" font-family="Inter,sans-serif" font-size="12" fill="#A06A3A" font-weight="700" text-anchor="end">4000+ sqft</text>
  <!-- Continue button -->
  <rect x="24" y="776" width="342" height="52" rx="12" fill="#1E6FD9"/>
  <text x="195" y="808" font-family="Inter,sans-serif" font-size="16" fill="#FFFFFF" font-weight="600" text-anchor="middle">Continue</text>
  <!-- Home indicator -->
  <rect x="155" y="828" width="80" height="4" rx="2" fill="#2A2825" opacity="0.2"/>
</svg>
