<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <!-- Cream canvas bg -->
  <rect width="390" height="844" fill="#F5F2EC"/>
  <!-- Dark charcoal toolbar -->
  <rect width="390" height="52" fill="#1C1917"/>
  <text x="20" y="34" font-family="Inter,sans-serif" font-size="12" fill="#F5F2EC" font-weight="600">9:41</text>
  <text x="20" y="34" font-family="Inter,sans-serif" font-size="22" fill="#F5F2EC" dy="0">‹</text>
  <text x="195" y="33" font-family="Inter,sans-serif" font-size="15" fill="#F5F2EC" font-weight="600" text-anchor="middle">Ground Floor</text>
  <!-- Draw mode button — teak active -->
  <rect x="322" y="8" width="36" height="36" rx="8" fill="#A06A3A"/>
  <text x="340" y="31" font-family="Inter,sans-serif" font-size="18" fill="#FFF" text-anchor="middle">▭</text>
  <!-- Perf button -->
  <text x="374" y="31" font-family="Inter,sans-serif" font-size="20" fill="#F5F2EC">⏱</text>

  <!-- Ruler H — warm -->
  <rect x="0"  y="52" width="390" height="36" fill="#FDFCF9" stroke="#E5E0D8" stroke-width="0.5"/>
  <rect x="0"  y="52" width="36"  height="792" fill="#FDFCF9" stroke="#E5E0D8" stroke-width="0.5"/>
  <!-- Ruler corner cap -->
  <rect x="0" y="52" width="36" height="36" fill="#F5F2EC"/>
  <!-- Ruler labels -->
  <text x="52"  y="74" font-family="Inter,sans-serif" font-size="9" fill="#8A857C">10′</text>
  <text x="112" y="74" font-family="Inter,sans-serif" font-size="9" fill="#8A857C">20′</text>
  <text x="172" y="74" font-family="Inter,sans-serif" font-size="9" fill="#8A857C">30′</text>
  <text x="232" y="74" font-family="Inter,sans-serif" font-size="9" fill="#8A857C">40′</text>
  <text x="292" y="74" font-family="Inter,sans-serif" font-size="9" fill="#8A857C">50′</text>
  <text x="6" y="122" font-family="Inter,sans-serif" font-size="9" fill="#8A857C">10′</text>
  <text x="6" y="182" font-family="Inter,sans-serif" font-size="9" fill="#8A857C">20′</text>
  <text x="6" y="242" font-family="Inter,sans-serif" font-size="9" fill="#8A857C">30′</text>

  <!-- Grid — warm subtle lines -->
  <line x1="96" y1="88" x2="96" y2="756" stroke="rgba(160,106,58,0.15)" stroke-width="1"/>
  <line x1="156" y1="88" x2="156" y2="756" stroke="rgba(160,106,58,0.07)" stroke-width="0.5"/>
  <line x1="216" y1="88" x2="216" y2="756" stroke="rgba(160,106,58,0.15)" stroke-width="1"/>
  <line x1="276" y1="88" x2="276" y2="756" stroke="rgba(160,106,58,0.07)" stroke-width="0.5"/>
  <line x1="336" y1="88" x2="336" y2="756" stroke="rgba(160,106,58,0.15)" stroke-width="1"/>
  <line x1="36" y1="148" x2="390" y2="148" stroke="rgba(160,106,58,0.15)" stroke-width="1"/>
  <line x1="36" y1="208" x2="390" y2="208" stroke="rgba(160,106,58,0.07)" stroke-width="0.5"/>
  <line x1="36" y1="268" x2="390" y2="268" stroke="rgba(160,106,58,0.15)" stroke-width="1"/>
  <line x1="36" y1="328" x2="390" y2="328" stroke="rgba(160,106,58,0.07)" stroke-width="0.5"/>
  <line x1="36" y1="388" x2="390" y2="388" stroke="rgba(160,106,58,0.15)" stroke-width="1"/>

  <!-- ROOMS — warm fills, no blue -->
  <!-- Living room: warm beige -->
  <rect x="56" y="100" width="148" height="132" fill="#F5EDD8" stroke="#C4A882" stroke-width="1.5"/>
  <text x="130" y="166" font-family="Inter,sans-serif" font-size="11" fill="#8A857C" text-anchor="middle" font-weight="600">Living Room</text>
  <text x="130" y="181" font-family="Inter,sans-serif" font-size="10" fill="#C4C0BA" text-anchor="middle">400 sqft</text>

  <!-- Kitchen: warm cream -->
  <rect x="204" y="100" width="84" height="132" fill="#FDF0DC" stroke="#C8A85A" stroke-width="1.5"/>
  <text x="246" y="166" font-family="Inter,sans-serif" font-size="10" fill="#8A857C" text-anchor="middle" font-weight="600">Kitchen</text>
  <text x="246" y="181" font-family="Inter,sans-serif" font-size="10" fill="#C4C0BA" text-anchor="middle">200 sqft</text>

  <!-- Bedroom: taupe — SELECTED (teak border + handles) -->
  <rect x="56" y="232" width="124" height="100" fill="#EDE8E0" stroke="#A06A3A" stroke-width="2"/>
  <text x="118" y="286" font-family="Inter,sans-serif" font-size="10" fill="#6B4226" text-anchor="middle" font-weight="700">Bedroom</text>
  <!-- Resize handles — teak -->
  <rect x="50"  y="226" width="10" height="10" rx="1" fill="#FFF" stroke="#A06A3A" stroke-width="1.5"/>
  <rect x="113" y="226" width="10" height="10" rx="1" fill="#FFF" stroke="#A06A3A" stroke-width="1.5"/>
  <rect x="175" y="226" width="10" height="10" rx="1" fill="#FFF" stroke="#A06A3A" stroke-width="1.5"/>
  <rect x="175" y="277" width="10" height="10" rx="1" fill="#FFF" stroke="#A06A3A" stroke-width="1.5"/>
  <rect x="175" y="328" width="10" height="10" rx="1" fill="#FFF" stroke="#A06A3A" stroke-width="1.5"/>

  <!-- Bathroom: sage -->
  <rect x="180" y="232" width="60" height="100" fill="#EAF0EA" stroke="#8CAE8C" stroke-width="1"/>
  <text x="210" y="286" font-family="Inter,sans-serif" font-size="10" fill="#8A857C" text-anchor="middle">Bath</text>

  <!-- Floor tabs — teak active -->
  <rect x="36" y="628" width="36" height="44" rx="0" fill="#A06A3A"/>
  <text x="54" y="655" font-family="Inter,sans-serif" font-size="9" fill="#FFF" text-anchor="middle" transform="rotate(-90,54,655)">GND</text>
  <rect x="36" y="674" width="36" height="44" rx="0" fill="#FDFCF9" stroke="#E5E0D8" stroke-width="0.5"/>
  <text x="54" y="701" font-family="Inter,sans-serif" font-size="9" fill="#8A857C" text-anchor="middle" transform="rotate(-90,54,701)">F1</text>

  <!-- Bottom estimate banner — dark -->
  <rect x="0" y="756" width="390" height="88" fill="#1C1917"/>
  <text x="24" y="784" font-family="Inter,sans-serif" font-size="12" fill="#8A857C">Live estimate · 4 rooms</text>
  <text x="24" y="810" font-family="Georgia,serif" font-size="24" fill="#F5F2EC" font-weight="700">₹45.3L</text>
  <text x="24" y="832" font-family="Inter,sans-serif" font-size="12" fill="#8A857C">± 12% · Mumbai 1.25×</text>
  <!-- Full estimate button -->
  <rect x="276" y="766" width="98" height="36" rx="8" fill="#A06A3A"/>
  <text x="325" y="789" font-family="Inter,sans-serif" font-size="12" fill="#FFF" text-anchor="middle" font-weight="700">Estimate →</text>
</svg>
