  <rect x="24" y="616" width="342" height="52" rx="6" fill="#1C1917"/>
  <text x="195" y="647" font-family="Inter,sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="700" letter-spacing="1">EXPORT PDF</text>

