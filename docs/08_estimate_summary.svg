  <text x="195" y="711" font-family="Inter,sans-serif" font-size="13" fill="#1C1917" text-anchor="middle" font-weight="700">Share Link</text>

  <rect x="155" y="828" width="80" height="4" rx="2" fill="#1C1917" opacity="0.15"/>
